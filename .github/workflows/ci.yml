name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["20.x", "24.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npx vitest run --coverage

  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm pack
      - name: Install the tarball into a clean project and run the bin
        run: |
          mkdir -p /tmp/smoke
          cd /tmp/smoke
          npm init -y
          npm install "$GITHUB_WORKSPACE"/claude-consult-mcp-*.tgz
          npx claude-consult-mcp --version
